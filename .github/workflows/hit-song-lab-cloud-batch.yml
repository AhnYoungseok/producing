name: Hit Song Lab cloud batch

on:
  push:
    paths:
      - ".github/workflows/hit-song-lab-cloud-batch.yml"
      - "backend/scripts/cloud_hit_song_batch.py"
      - "backend/seeds/cloud_reference_queue.json"
      - "backend/seeds/cloud_reference_fallback_hits.json"
      - "backend/requirements-cloud.txt"
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hit-song-lab-cloud-batch
  cancel-in-progress: false

jobs:
  add-reference-songs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-cloud.txt

      - name: Install cloud batch dependencies
        run: python -m pip install -r backend/requirements-cloud.txt

      - name: Add 10 unique reference songs to cloud ledger and Google Sheets when configured
        run: python backend/scripts/cloud_hit_song_batch.py --batch-size 10

      - name: Commit cloud ledger
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cloud_ledger/song_library.json cloud_ledger/song_library.csv cloud_ledger/summary.csv
          if git diff --cached --quiet; then
            echo "No cloud ledger changes to commit."
          else
            git commit -m "Update cloud song ledger"
            git push
          fi
