name: Hit Song Lab cloud batch

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hit-song-lab-cloud-batch
  cancel-in-progress: false

jobs:
  add-reference-songs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TZ: Asia/Seoul
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements-cloud.txt

      - name: Install cloud batch dependencies
        run: python -m pip install -r backend/requirements-cloud.txt

      - name: Add 10 unique reference songs to Google Sheets
        run: python backend/scripts/cloud_hit_song_batch.py --batch-size 10
