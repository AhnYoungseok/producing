<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hit Song Lab</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f7fb;
        --panel: #ffffff;
        --panel-soft: #edf4f8;
        --ink: #111827;
        --muted: #5d6677;
        --quiet: #7b8494;
        --line: #d9e1ec;
        --line-strong: #c7d2e1;
        --teal: #0f766e;
        --teal-dark: #115e59;
        --blue: #2563eb;
        --amber: #b45309;
        --rose: #be123c;
        --green-soft: #e6f4f1;
        --blue-soft: #eaf0ff;
        --amber-soft: #fff4df;
        --rose-soft: #ffe8ee;
        --shadow: 0 14px 34px rgba(15, 23, 42, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      a {
        color: var(--teal-dark);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        min-height: 36px;
        border: 1px solid var(--teal);
        border-radius: 6px;
        padding: 0 12px;
        background: var(--teal);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        white-space: nowrap;
      }

      button:hover {
        background: var(--teal-dark);
        border-color: var(--teal-dark);
      }

      button.secondary {
        background: #fff;
        border-color: var(--line-strong);
        color: var(--ink);
      }

      button.secondary:hover {
        border-color: var(--teal);
        color: var(--teal-dark);
      }

      button.ghost {
        min-height: 30px;
        padding: 0 9px;
        background: transparent;
        border-color: transparent;
        color: var(--muted);
      }

      button.ghost:hover {
        background: var(--panel-soft);
        border-color: var(--line);
        color: var(--ink);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font-size: 14px;
      }

      input,
      select {
        height: 40px;
        padding: 0 10px;
      }

      textarea {
        min-height: 76px;
        padding: 10px;
        line-height: 1.45;
        resize: vertical;
      }

      .shell {
        width: min(1480px, calc(100% - 32px));
        margin: 0 auto;
        padding: 26px 0 44px;
      }

      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0;
        font-size: clamp(29px, 4vw, 45px);
        line-height: 1.02;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 9px 0 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
      }

      .status {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 36px;
        padding: 8px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--muted);
        font-size: 13px;
        box-shadow: var(--shadow);
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: var(--teal);
      }

      .dot.error {
        background: var(--rose);
      }

      .metrics {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
        margin-bottom: 14px;
      }

      .metric,
      .panel,
      .song-card,
      .sidebar {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
      }

      .metric {
        min-height: 108px;
        padding: 15px;
      }

      .metric-label {
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      .metric-value {
        margin-top: 8px;
        font-size: 30px;
        font-weight: 900;
        line-height: 1;
      }

      .metric-hint {
        margin-top: 9px;
        color: var(--quiet);
        font-size: 12px;
        line-height: 1.35;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 380px;
        gap: 14px;
        align-items: start;
      }

      .panel-head,
      .sidebar-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
      }

      h2 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0;
      }

      .count-badge {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 9px;
        border-radius: 999px;
        background: var(--green-soft);
        color: var(--teal-dark);
        font-size: 12px;
        font-weight: 900;
      }

      .finder {
        display: grid;
        grid-template-columns: minmax(220px, 1.45fr) repeat(5, minmax(112px, 1fr));
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-soft);
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
      }

      .chip {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 0 11px;
        background: #fff;
        color: var(--muted);
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .chip.active,
      .chip:hover {
        border-color: var(--teal);
        background: var(--green-soft);
        color: var(--teal-dark);
      }

      .explore-summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        padding: 12px 16px;
        border-bottom: 1px solid var(--line);
      }

      .summary-box {
        min-height: 66px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px;
        background: #fbfdff;
      }

      .summary-title {
        color: var(--muted);
        font-size: 12px;
        font-weight: 900;
      }

      .summary-value {
        margin-top: 5px;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.35;
      }

      .song-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
        padding: 14px 16px 16px;
      }

      .load-more {
        display: flex;
        justify-content: center;
        padding: 0 16px 16px;
      }

      .song-card {
        min-height: 300px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        gap: 11px;
      }

      .song-top {
        display: flex;
        justify-content: space-between;
        gap: 10px;
      }

      .song-title {
        margin: 0;
        font-size: 17px;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .artist {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .date-pill {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        height: 26px;
        border-radius: 999px;
        padding: 0 9px;
        background: var(--blue-soft);
        color: #1d4ed8;
        font-size: 12px;
        font-weight: 900;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .tag {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        border-radius: 999px;
        padding: 0 8px;
        background: #f1f5f9;
        color: #334155;
        font-size: 12px;
        font-weight: 800;
      }

      .tag.blue {
        background: var(--blue-soft);
        color: var(--blue);
      }

      .tag.amber {
        background: var(--amber-soft);
        color: var(--amber);
      }

      .tag.rose {
        background: var(--rose-soft);
        color: var(--rose);
      }

      .field {
        min-height: 48px;
      }

      .field-label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 900;
        text-transform: uppercase;
      }

      .field-value {
        margin-top: 4px;
        color: var(--ink);
        font-size: 13px;
        line-height: 1.42;
      }

      .song-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: auto;
      }

      .song-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 36px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        padding: 0 11px;
        background: #fff;
        color: var(--ink);
        font-size: 13px;
        font-weight: 800;
      }

      .song-actions a:hover {
        border-color: var(--teal);
        color: var(--teal-dark);
        text-decoration: none;
      }

      details {
        border-top: 1px solid var(--line);
        padding-top: 9px;
      }

      summary {
        color: var(--teal-dark);
        font-size: 12px;
        font-weight: 900;
        cursor: pointer;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 9px;
        margin-top: 9px;
      }

      .empty {
        min-height: 230px;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--muted);
        text-align: center;
        line-height: 1.5;
      }

      .sidebar {
        position: sticky;
        top: 14px;
        overflow: hidden;
      }

      .sidebar-body {
        padding: 14px;
      }

      .selected-list {
        display: grid;
        gap: 8px;
        margin-bottom: 12px;
      }

      .selected-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 9px;
        background: #fbfdff;
      }

      .selected-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 13px;
        font-weight: 900;
      }

      .selected-meta {
        margin-top: 3px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: var(--muted);
        font-size: 12px;
      }

      .selected-actions {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .selected-actions a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 30px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 0 8px;
        background: #fff;
        color: var(--teal-dark);
        font-size: 12px;
        font-weight: 900;
      }

      .selected-actions a:hover {
        border-color: var(--teal);
        text-decoration: none;
      }

      .stack {
        display: grid;
        gap: 10px;
      }

      .action-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .recipe {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fbfdff;
        overflow: hidden;
      }

      .recipe-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 10px;
        border-bottom: 1px solid var(--line);
      }

      .recipe-title {
        font-size: 13px;
        font-weight: 900;
      }

      .recipe-body {
        max-height: min(58vh, 620px);
        overflow-y: auto;
        overscroll-behavior: contain;
        padding: 11px;
        white-space: pre-wrap;
        color: var(--ink);
        font-size: 13px;
        line-height: 1.48;
      }

      .small {
        color: var(--quiet);
        font-size: 12px;
        line-height: 1.45;
      }

      .error-box {
        margin: 14px 16px 16px;
        border: 1px solid #fecdd3;
        border-radius: 8px;
        padding: 14px;
        background: #fff1f2;
        color: #9f1239;
        font-size: 13px;
        line-height: 1.5;
      }

      @media (max-width: 1180px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        .finder {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 820px) {
        .shell {
          width: min(100% - 20px, 1480px);
          padding-top: 16px;
        }

        header {
          display: grid;
        }

        .status {
          justify-self: start;
        }

        .metrics,
        .explore-summary,
        .song-grid {
          grid-template-columns: 1fr;
        }

        .finder {
          grid-template-columns: 1fr;
        }

        .song-top,
        .panel-head,
        .sidebar-head {
          align-items: flex-start;
        }

        .detail-grid,
        .action-row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <header>
        <div>
          <h1>Hit Song Lab</h1>
          <p class="subtitle">참고곡을 찾고, 고르고, 새 곡 방향으로 조합합니다.</p>
        </div>
        <div class="status">
          <span id="statusDot" class="dot"></span>
          <span id="statusText">데이터 확인 중</span>
        </div>
      </header>

      <section class="metrics" aria-label="데이터 현황">
        <div class="metric">
          <div class="metric-label">누적 기준</div>
          <div id="totalCount" class="metric-value">-</div>
          <div class="metric-hint">중복 방지 기준 전체 수</div>
        </div>
        <div class="metric">
          <div class="metric-label">상세 공개곡</div>
          <div id="visibleCount" class="metric-value">-</div>
          <div class="metric-hint">아래에서 바로 참고 가능한 곡</div>
        </div>
        <div class="metric">
          <div class="metric-label">선택한 참고곡</div>
          <div id="selectedCountMetric" class="metric-value">0</div>
          <div class="metric-hint">조합 브리프 기준</div>
        </div>
        <div class="metric">
          <div class="metric-label">마지막 추가</div>
          <div id="updatedAt" class="metric-value">-</div>
          <div id="latestAdded" class="metric-hint">-</div>
        </div>
      </section>

      <div class="layout">
        <section class="panel">
          <div class="panel-head">
            <h2>참고곡 찾기</h2>
            <span id="resultCount" class="count-badge">0곡</span>
          </div>

          <div class="finder">
            <input id="searchInput" type="search" placeholder="곡명, 아티스트, 후크, 테마 검색" />
            <select id="countryFilter" aria-label="국가"></select>
            <select id="genreFilter" aria-label="장르"></select>
            <select id="bpmFilter" aria-label="BPM"></select>
            <select id="hookFilter" aria-label="후크"></select>
            <select id="confidenceFilter" aria-label="신뢰도"></select>
          </div>

          <div id="quickChips" class="chips"></div>

          <div class="explore-summary">
            <div class="summary-box">
              <div class="summary-title">현재 BPM</div>
              <div id="summaryBpm" class="summary-value">-</div>
            </div>
            <div class="summary-box">
              <div class="summary-title">주요 후크</div>
              <div id="summaryHook" class="summary-value">-</div>
            </div>
            <div class="summary-box">
              <div class="summary-title">주요 장르</div>
              <div id="summaryGenre" class="summary-value">-</div>
            </div>
          </div>

          <div id="songGrid" class="song-grid"></div>
          <div class="load-more">
            <button id="loadMoreButton" class="secondary" type="button">더 보기</button>
          </div>
        </section>

        <aside class="sidebar">
          <div class="sidebar-head">
            <h2>조합하기</h2>
            <button id="clearSelectionButton" class="ghost" type="button">비우기</button>
          </div>
          <div class="sidebar-body">
            <div id="selectedList" class="selected-list"></div>
            <div class="stack">
              <textarea id="ideaInput" placeholder="내 곡 키워드: 예) 밤 산책, 후회 없는 이별, 120 BPM 댄스팝"></textarea>
              <div class="action-row">
                <button id="randomButton" class="secondary" type="button">랜덤 3곡</button>
                <button id="recipeButton" type="button">브리프 생성</button>
              </div>
            </div>
            <div class="recipe">
              <div class="recipe-head">
                <div class="recipe-title">창작 브리프</div>
                <button id="copyRecipeButton" class="ghost" type="button">복사</button>
              </div>
              <div id="recipeBody" class="recipe-body">참고곡을 2곡 이상 담으면 조합 브리프를 만들 수 있습니다.</div>
            </div>
            <p class="small">
              공개 상세곡은 GitHub 데이터에서 직접 읽습니다. 기존 로컬 DB 곡은 중복 방지용 해시로만 보관됩니다.
            </p>
          </div>
        </aside>
      </div>
    </main>

    <script>
      const REPO = "AhnYoungseok/producing";
      const LEDGER_API_URL =
        `https://api.github.com/repos/${REPO}/contents/cloud_ledger/song_library.json?ref=main`;
      const LEDGER_RAW_URL =
        `https://raw.githubusercontent.com/${REPO}/main/cloud_ledger/song_library.json`;
      const SELECTION_KEY = "hit-song-lab-selected-v2";

      const state = {
        ledger: null,
        songs: [],
        filtered: [],
        selected: [],
        activePreset: "",
        renderLimit: 80,
      };

      const bpmBuckets = [
        ["", "전체 BPM"],
        ["slow", "느림 < 90"],
        ["mid", "90-110"],
        ["lift", "111-124"],
        ["dance", "125-140"],
        ["fast", "141+"],
      ];

      const presets = [
        { id: "latest", label: "최신 추가" },
        { id: "lyrical", label: "서정 팝/발라드" },
        { id: "us", label: "US 싱글 차트형" },
        { id: "kpop", label: "K-pop 글로벌형" },
        { id: "dance", label: "댄스/업템포" },
        { id: "ballad", label: "발라드/감정선" },
        { id: "hiphop", label: "힙합/랩 포켓" },
        { id: "title", label: "제목 후크" },
        { id: "groove", label: "그루브 후크" },
        { id: "90-110", label: "90-110 BPM" },
        { id: "125-140", label: "125-140 BPM" },
      ];

      const $ = (id) => document.getElementById(id);

      function identity(song) {
        return `${normalize(song.title)}::${normalize(song.artist)}`;
      }

      function normalize(value) {
        return String(value || "")
          .normalize("NFKD")
          .replace(/[\u0300-\u036f]/g, "")
          .replace(/['"‘’“”()[\]{}.,!?]/g, "")
          .replace(/\s+/g, " ")
          .trim()
          .toLowerCase();
      }

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function compactDate(value) {
        if (!value) return "-";
        const text = String(value);
        if (/^\d{4}\.\d{1,2}\.\d{1,2}$/.test(text)) return text;
        const date = new Date(text);
        if (Number.isNaN(date.getTime())) return text;
        return `${date.getFullYear()}.${date.getMonth() + 1}.${date.getDate()}`;
      }

      function number(value) {
        return Number(value || 0).toLocaleString("ko-KR");
      }

      function setStatus(text, isError = false) {
        $("statusText").textContent = text;
        $("statusDot").classList.toggle("error", isError);
      }

      function decodeBase64Utf8(value) {
        const binary = atob(value.replace(/\s/g, ""));
        const bytes = Uint8Array.from(binary, (char) => char.charCodeAt(0));
        return new TextDecoder("utf-8").decode(bytes);
      }

      async function loadLedger() {
        setStatus("GitHub 데이터 읽는 중");
        const rawResponse = await fetch(`${LEDGER_RAW_URL}?cache=${Date.now()}`, {
          cache: "no-store",
        });
        if (rawResponse.ok) {
          return rawResponse.json();
        }

        const apiResponse = await fetch(`${LEDGER_API_URL}&cache=${Date.now()}`, {
          cache: "no-store",
          headers: { Accept: "application/vnd.github+json" },
        });
        if (apiResponse.ok) {
          const payload = await apiResponse.json();
          if (payload.content) {
            return JSON.parse(decodeBase64Utf8(payload.content));
          }
        }

        throw new Error(`데이터 응답 오류: raw ${rawResponse.status}, api ${apiResponse.status}`);
      }

      function sortSongs(songs) {
        return [...songs].sort((a, b) => {
          const left = new Date(a.added_at || a.added_date || 0).getTime();
          const right = new Date(b.added_at || b.added_date || 0).getTime();
          return right - left;
        });
      }

      function uniqueOptions(songs, key) {
        return [...new Set(songs.map((song) => song[key]).filter(Boolean))].sort((a, b) =>
          String(a).localeCompare(String(b), "ko")
        );
      }

      function fillSelect(id, values, label) {
        const select = $(id);
        const current = select.value;
        select.innerHTML = `<option value="">${label}</option>`;
        values.forEach((value) => {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = value;
          select.appendChild(option);
        });
        select.value = values.includes(current) ? current : "";
      }

      function fillStaticSelect(id, rows) {
        const select = $(id);
        select.innerHTML = rows.map(([value, label]) => `<option value="${value}">${label}</option>`).join("");
      }

      function getBpm(song) {
        const bpm = Number(song.bpm);
        return Number.isFinite(bpm) && bpm > 0 ? bpm : null;
      }

      function matchesBpm(song, bucket) {
        if (!bucket) return true;
        const bpm = getBpm(song);
        if (!bpm) return false;
        if (bucket === "slow") return bpm < 90;
        if (bucket === "mid") return bpm >= 90 && bpm <= 110;
        if (bucket === "lift") return bpm >= 111 && bpm <= 124;
        if (bucket === "dance") return bpm >= 125 && bpm <= 140;
        if (bucket === "fast") return bpm >= 141;
        return true;
      }

      function textOf(song) {
        return [
          song.title,
          song.artist,
          song.genre,
          song.country,
          song.key,
          song.hook_type,
          song.hook_location,
          song.hook_cue,
          song.lyric_theme,
          song.speaker_situation,
          song.story_flow,
          song.why_hook_works,
          song.arrangement,
          song.vocal,
          song.mixing,
          song.hit_factor,
          song.producer_takeaway,
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();
      }

      function matchesSearch(song, query) {
        if (!query) return true;
        return normalize(textOf(song)).includes(normalize(query));
      }

      function matchesPreset(song) {
        const preset = state.activePreset;
        if (!preset || preset === "latest") return true;
        const genre = normalize(song.genre);
        const country = normalize(song.country);
        const hook = normalize(`${song.hook_type} ${song.hook_cue} ${song.hook_location}`);
        const lyricTheme = normalize(song.lyric_theme);
        const body = normalize(textOf(song));
        const bpm = getBpm(song);

        if (preset === "us") return country === "us" || body.includes("billboard") || body.includes("hot 100");
        if (preset === "kpop") return country.includes("korea") || country === "kr" || genre.includes("k pop") || genre.includes("kpop");
        if (preset === "lyrical") return genre.includes("ballad") || genre.includes("soft") || genre.includes("lyrical") || lyricTheme.includes("longing") || lyricTheme.includes("regret") || lyricTheme.includes("healing") || lyricTheme.includes("intimate");
        if (preset === "dance") return genre.includes("dance") || (bpm && bpm >= 118);
        if (preset === "ballad") return genre.includes("ballad") || genre.includes("soft") || lyricTheme.includes("longing") || lyricTheme.includes("regret") || lyricTheme.includes("healing");
        if (preset === "hiphop") return genre.includes("hip") || genre.includes("rap") || genre.includes("trap") || hook.includes("beat pocket");
        if (preset === "title") return hook.includes("title") || hook.includes("제목");
        if (preset === "groove") return hook.includes("groove") || body.includes("groove");
        if (preset === "90-110") return bpm && bpm >= 90 && bpm <= 110;
        if (preset === "125-140") return bpm && bpm >= 125 && bpm <= 140;
        return true;
      }

      function filteredSongs() {
        const query = $("searchInput").value.trim();
        const country = $("countryFilter").value;
        const genre = $("genreFilter").value;
        const bpmBucket = $("bpmFilter").value;
        const hook = $("hookFilter").value;
        const confidence = $("confidenceFilter").value;

        return state.songs.filter((song) => {
          return (
            matchesSearch(song, query) &&
            matchesPreset(song) &&
            matchesBpm(song, bpmBucket) &&
            (!country || song.country === country) &&
            (!genre || song.genre === genre) &&
            (!hook || song.hook_type === hook) &&
            (!confidence || song.data_confidence === confidence)
          );
        });
      }

      function topCounts(songs, mapper, limit = 3) {
        const counts = new Map();
        songs.forEach((song) => {
          const key = mapper(song);
          if (!key) return;
          counts.set(key, (counts.get(key) || 0) + 1);
        });
        return [...counts.entries()]
          .sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0], "ko"))
          .slice(0, limit);
      }

      function summarizeBpm(songs) {
        const bpms = songs.map(getBpm).filter(Boolean);
        if (!bpms.length) return "-";
        const avg = Math.round(bpms.reduce((sum, bpm) => sum + bpm, 0) / bpms.length);
        const min = Math.min(...bpms);
        const max = Math.max(...bpms);
        return `${avg} BPM 중심 (${min}-${max})`;
      }

      function renderExploreSummary() {
        const songs = state.filtered;
        $("summaryBpm").textContent = summarizeBpm(songs);
        $("summaryHook").textContent =
          topCounts(songs, (song) => song.hook_type, 2)
            .map(([name, count]) => `${name} ${count}`)
            .join(" / ") || "-";
        $("summaryGenre").textContent =
          topCounts(songs, (song) => song.genre, 2)
            .map(([name, count]) => `${name} ${count}`)
            .join(" / ") || "-";
      }

      function isSelected(song) {
        const key = identity(song);
        return state.selected.some((item) => identity(item) === key);
      }

      function addSong(song) {
        if (!isSelected(song)) {
          state.selected.push(song);
          saveSelection();
          renderSelection();
          renderSongs();
        }
      }

      function removeSong(key) {
        state.selected = state.selected.filter((song) => identity(song) !== key);
        saveSelection();
        renderSelection();
        renderSongs();
      }

      function saveSelection() {
        localStorage.setItem(SELECTION_KEY, JSON.stringify(state.selected.map(identity)));
      }

      function restoreSelection() {
        try {
          const keys = new Set(JSON.parse(localStorage.getItem(SELECTION_KEY) || "[]"));
          state.selected = state.songs.filter((song) => keys.has(identity(song)));
        } catch {
          state.selected = [];
        }
      }

      function renderMetrics(ledger) {
        const songs = state.songs;
        const baselineCount = Number(ledger.baseline?.count || 0);
        const total = Number(ledger.total_after_baseline || baselineCount + songs.length);
        const latest = songs[0];
        $("totalCount").textContent = number(total);
        $("visibleCount").textContent = number(songs.length);
        $("selectedCountMetric").textContent = number(state.selected.length);
        $("updatedAt").textContent = compactDate(ledger.updated_at);
        $("latestAdded").textContent = latest ? `${latest.title} - ${latest.artist}` : "-";
      }

      function renderChips() {
        $("quickChips").innerHTML = presets
          .map(
            (preset) =>
              `<button class="chip ${state.activePreset === preset.id ? "active" : ""}" type="button" data-preset="${preset.id}">${preset.label}</button>`
          )
          .join("");
      }

      function songTags(song) {
        const bpm = getBpm(song);
        return [
          song.genre,
          song.country,
          song.release_year,
          bpm ? `${bpm} BPM` : "",
          song.key,
          song.data_confidence ? `신뢰도 ${song.data_confidence}` : "",
        ].filter(Boolean);
      }

      function youtubeUrl(song) {
        return song.youtube_url || `https://www.youtube.com/results?search_query=${encodeURIComponent(`${song.artist} ${song.title} official`)}`;
      }

      function renderSongs() {
        state.filtered = filteredSongs();
        const visibleSongs = state.filtered.slice(0, state.renderLimit);
        $("resultCount").textContent = `${number(state.filtered.length)}곡`;
        renderExploreSummary();

        const grid = $("songGrid");
        if (!state.filtered.length) {
          grid.innerHTML = `<div class="empty">조건에 맞는 공개 상세곡이 없습니다.</div>`;
          $("loadMoreButton").style.display = "none";
          return;
        }

        $("loadMoreButton").style.display = visibleSongs.length < state.filtered.length ? "inline-flex" : "none";
        $("loadMoreButton").textContent = `더 보기 (${number(visibleSongs.length)} / ${number(state.filtered.length)})`;

        grid.innerHTML = visibleSongs
          .map((song) => {
            const key = identity(song);
            const selected = isSelected(song);
            const tags = songTags(song)
              .map((tag, index) => `<span class="tag ${index === 0 ? "blue" : index === 3 ? "amber" : ""}">${escapeHtml(tag)}</span>`)
              .join("");
            const hook = [song.hook_cue, song.hook_type, song.hook_location].filter(Boolean).join(" / ");
            const youtube = youtubeUrl(song);

            return `
              <article class="song-card">
                <div class="song-top">
                  <div>
                    <h3 class="song-title">${escapeHtml(song.title)}</h3>
                    <div class="artist">${escapeHtml(song.artist)}</div>
                  </div>
                  <span class="date-pill">${escapeHtml(compactDate(song.added_date || song.added_at))}</span>
                </div>
                <div class="tags">${tags}</div>
                <div class="field">
                  <div class="field-label">Hook</div>
                  <div class="field-value">${escapeHtml(hook || "-")}</div>
                </div>
                <div class="field">
                  <div class="field-label">Why It Works</div>
                  <div class="field-value">${escapeHtml(song.why_hook_works || song.hit_factor || "-")}</div>
                </div>
                <div class="field">
                  <div class="field-label">Producer Takeaway</div>
                  <div class="field-value">${escapeHtml(song.producer_takeaway || "-")}</div>
                </div>
                <details>
                  <summary>분석 더 보기</summary>
                  <div class="detail-grid">
                    ${detailCell("테마", song.lyric_theme)}
                    ${detailCell("상황", song.speaker_situation)}
                    ${detailCell("구조", song.story_flow)}
                    ${detailCell("코드", song.chord_progression)}
                    ${detailCell("편곡", song.arrangement)}
                    ${detailCell("보컬/믹스", [song.vocal, song.mixing].filter(Boolean).join(" / "))}
                  </div>
                </details>
                <div class="song-actions">
                  <button type="button" data-add="${escapeHtml(key)}" ${selected ? "disabled" : ""}>${selected ? "담김" : "참고 추가"}</button>
                  <a href="${escapeHtml(youtube)}" target="_blank" rel="noopener">YouTube 검색</a>
                </div>
              </article>
            `;
          })
          .join("");
      }

      function detailCell(label, value) {
        return `
          <div class="field">
            <div class="field-label">${escapeHtml(label)}</div>
            <div class="field-value">${escapeHtml(value || "-")}</div>
          </div>
        `;
      }

      function renderSelection() {
        $("selectedCountMetric").textContent = number(state.selected.length);
        const list = $("selectedList");
        if (!state.selected.length) {
          list.innerHTML = `<div class="empty">참고곡을 담아 조합을 시작합니다.</div>`;
          return;
        }

        list.innerHTML = state.selected
          .map((song) => {
            const key = identity(song);
            const youtube = youtubeUrl(song);
            return `
              <div class="selected-row">
                <div>
                  <div class="selected-title">${escapeHtml(song.title)}</div>
                  <div class="selected-meta">${escapeHtml(song.artist)} · ${escapeHtml(song.genre || "-")} · ${escapeHtml(song.bpm || "-")} BPM</div>
                </div>
                <div class="selected-actions">
                  <a href="${escapeHtml(youtube)}" target="_blank" rel="noopener">YouTube</a>
                  <button class="ghost" type="button" data-remove="${escapeHtml(key)}">삭제</button>
                </div>
              </div>
            `;
          })
          .join("");
      }

      function chooseRandom() {
        const pool = state.filtered.length ? state.filtered : state.songs;
        const shuffled = [...pool].sort(() => Math.random() - 0.5);
        state.selected = shuffled.slice(0, Math.min(3, shuffled.length));
        saveSelection();
        renderSelection();
        renderSongs();
        buildRecipe();
      }

      function commonValue(songs, mapper, fallback = "-") {
        const top = topCounts(songs, mapper, 1)[0];
        return top ? top[0] : fallback;
      }

      function shortList(values, limit = 3) {
        return [...new Set(values.filter(Boolean))].slice(0, limit).join(" / ") || "-";
      }

      function averageBpmNumber(songs) {
        const bpms = songs.map(getBpm).filter(Boolean);
        if (!bpms.length) return null;
        return Math.round(bpms.reduce((sum, bpm) => sum + bpm, 0) / bpms.length);
      }

      function chordSourceSummary(songs) {
        const chords = songs
          .map((song) => song.chord_progression)
          .filter((value) => value && String(value).trim() && String(value).trim().toLowerCase() !== "null");
        if (!chords.length) {
          return "선택곡 대부분은 차트 메타데이터 기반이라 원곡 코드가 미확정입니다. 아래 진행은 새 곡용 안전 설계안입니다.";
        }
        return shortList(chords, 3);
      }

      function inferKeyCenter(songs) {
        const keys = songs.map((song) => song.key).filter(Boolean);
        if (keys.length) return `${shortList(keys, 3)} 중 보컬 레인지에 맞춰 조옮김`;
        const dominantGenre = normalize(commonValue(songs, (song) => song.genre));
        const avg = averageBpmNumber(songs);
        if (dominantGenre.includes("ballad") || dominantGenre.includes("soft") || (avg && avg < 95)) {
          return "G major / E minor 또는 C major / A minor";
        }
        return "C major / A minor 또는 F major / D minor";
      }

      function harmonicBlueprint(songs) {
        const dominantGenre = normalize(commonValue(songs, (song) => song.genre));
        const avg = averageBpmNumber(songs);
        const isSoft = dominantGenre.includes("ballad") || dominantGenre.includes("soft") || (avg && avg < 95);
        const tonalCenter = inferKeyCenter(songs);
        const emotionalColor = isSoft ? "서정 팝/발라드" : "멜로딕 팝";

        return [
          `- 원곡 코드 참고: ${chordSourceSummary(songs)}`,
          `- 새 곡 권장 중심키: ${tonalCenter}`,
          `- 화성 목표: ${emotionalColor} 기준으로 I, vi, IV, V를 뼈대로 잡고 add9, maj7, sus4, 세컨더리 도미넌트로 감정선을 만듭니다.`,
          "",
          "A안: G major 기준 서정 팝 발라드 진행",
          "Verse 8마디:",
          "| G(add9) | D/F# | Em7 | Cmaj7 |",
          "| Am7 | Dsus4 - D | G/B | Cadd9 - D |",
          "- 기능: I(add9) - V6 - vi7 - IVmaj7 - ii7 - Vsus4/V - I6 - IVadd9/V",
          "- 역할: 1-4마디는 안정과 그리움, 5-8마디는 ii-V 느낌으로 프리코러스 진입 준비.",
          "",
          "Pre-Chorus 8마디:",
          "| Em7 | Cmaj7 | G/D | D/F# |",
          "| Am7 | B7/D# | Em7 - D/F# | Gsus4 - G |",
          "- 기능: vi7 - IVmaj7 - I64 - V6 - ii7 - V/vi - vi7/V6 - Isus4/I",
          "- 역할: B7/D#는 E minor로 잠깐 당기는 세컨더리 도미넌트라 감정 압력을 만들고, Gsus4-G로 코러스 문을 엽니다.",
          "",
          "Chorus 8마디:",
          "| Cadd9 | G/B | Am7 | Dsus4 - D |",
          "| G | D/F# | Em7 | Cadd9 - D |",
          "- 기능: IVadd9 - I6 - ii7 - Vsus4/V - I - V6 - vi7 - IVadd9/V",
          "- 역할: 코러스를 IV에서 시작하면 밝지만 살짝 아픈 느낌이 나고, 5마디 I 착지가 제목 훅의 해상도처럼 들립니다.",
          "",
          "Bridge 8마디:",
          "| Em9 | Cmaj7(#11) | G/D | D7sus4 - D7 |",
          "| Am9 | C/D | G/B - B7/D# | Em7 - D |",
          "- 기능: vi9 - IVmaj7(#11) - I64 - V7sus/V7 - ii9 - IV/V - I6/V/vi - vi/V",
          "- 역할: #11, 9th, sus4는 화려함보다 긴장색입니다. 탑노트는 한 음이나 두 음만 움직이게 보이싱하세요.",
          "",
          "B안: E minor 기준 더 쓸쓸한 진행",
          "Verse: | Em9 | Cmaj7 | G | D/F# | Am7 | B7(b9) | Em9 | Dsus4 - D |",
          "Chorus: | Cmaj7 | D | Em7 | G/B | Cadd9 | Dsus4 - D | G | B7/D# |",
          "- B7(b9)는 너무 재즈처럼 들리면 B7sus4-B7로 단순화합니다.",
          "",
          "보이싱 지시:",
          "- 피아노/기타는 3도와 7도를 먼저 잡고, 멜로디가 비는 곳에 add9 또는 sus4만 얹습니다.",
          "- 베이스는 G - F# - E - C처럼 하행하거나, 코러스에서 C - B - A - D로 반대로 움직여 훅을 띄웁니다.",
          "- 훅 첫 음이 3도나 5도에 걸리면 안정적이고, 9도에 걸리면 더 현대적인 서정 팝 느낌이 납니다.",
        ].join("\n");
      }

      function structureBlueprint(songs) {
        const avg = averageBpmNumber(songs);
        const tempoNote = avg ? `${avg} BPM 근처` : "80-105 BPM ballad 또는 105-124 BPM soft pop";
        return [
          `- 목표 템포: ${tempoNote}. 너무 느리면 8비트 하이햇이나 기타 아르페지오로 흐름을 유지합니다.`,
          "0:00 Intro 4마디: 코드 루프의 첫 2마디만 보여주고, 훅 리듬의 그림자를 악기 모티프로 짧게 둡니다.",
          "0:12 Verse 1 8마디: 낮은 음역, 짧은 문장, 코드 변화는 크게 움직이지 않게 둡니다.",
          "0:36 Pre-Chorus 8마디: 베이스 하행/상행을 분명히 만들고, B7/D# 같은 당김 화음으로 코러스 직전 압력을 올립니다.",
          "0:58 Chorus 8-16마디: 제목 훅은 1마디 안에 들리게 하고, 5마디째 한 번 더 해상합니다.",
          "1:24 Post/Tag 2-4마디: 가사보다 모음/짧은 제목 큐로 기억 장치를 남깁니다.",
          "1:34 Verse 2 8마디: 드럼이나 서브 리듬을 추가하되 코드 밀도는 1절보다 조금만 높입니다.",
          "1:58 Pre-Chorus 8마디: 코러스 전 마지막 2마디를 비워 보컬 호흡을 확보합니다.",
          "2:20 Chorus 16마디: 첫 8마디는 익숙하게, 뒤 8마디는 하모니/대답 보컬/상행 애드립으로 확장합니다.",
          "2:52 Bridge 8마디: 상대단조나 IVmaj7(#11) 색으로 시점을 바꾼 뒤, 마지막 2마디는 드럼을 덜어냅니다.",
          "3:16 Final Chorus 16마디: 첫 줄은 거의 무반주 또는 얇게 시작하고, 5마디부터 전체 레이어를 엽니다.",
          "3:48 Outro 4마디: 제목 큐나 Intro 모티프를 한 번만 남기고 끝냅니다.",
        ].join("\n");
      }

      function buildRecipe() {
        const songs = state.selected;
        if (songs.length < 2) {
          $("recipeBody").textContent = "참고곡을 2곡 이상 담으면 조합 브리프를 만들 수 있습니다.";
          return;
        }

        const idea = $("ideaInput").value.trim();
        const avgBpm = summarizeBpm(songs);
        const genres = shortList(songs.map((song) => song.genre));
        const hooks = shortList(songs.map((song) => song.hook_type));
        const hookLocations = shortList(songs.map((song) => song.hook_location));
        const keys = shortList(songs.map((song) => song.key));
        const themes = shortList(songs.map((song) => song.lyric_theme), 2);
        const arrangements = shortList(songs.map((song) => song.arrangement), 2);
        const vocals = shortList(songs.map((song) => song.vocal), 2);
        const mixes = shortList(songs.map((song) => song.mixing), 2);
        const dominantHook = commonValue(songs, (song) => song.hook_type);
        const dominantGenre = commonValue(songs, (song) => song.genre);
        const harmonyPlan = harmonicBlueprint(songs);
        const structurePlan = structureBlueprint(songs);

        const references = songs.map((song) => `${song.title} - ${song.artist}`).join(" + ");
        const brief = [
          `참고 조합: ${references}`,
          idea ? `내 곡 키워드: ${idea}` : "내 곡 키워드: 직접 입력 전",
          "",
          "[방향 요약]",
          `- 장르 중심: ${dominantGenre} 기반, 보조 색채는 ${genres}`,
          `- 템포/키 기준: ${avgBpm}, 후보 키 ${keys}`,
          "- 아래 코드는 원곡 복제가 아니라 선택곡 분위기를 바탕으로 만든 새 곡용 설계안입니다.",
          "",
          "[코드/화성 우선 설계]",
          harmonyPlan,
          "",
          "[곡 구조 우선 설계]",
          structurePlan,
          "",
          "[후크 설계]",
          `- 참고 후크 계열: ${hooks}`,
          `- 핵심 방식: ${dominantHook}`,
          `- 위치: ${hookLocations}`,
          "- 제목/시그니처 큐는 2-6음절 또는 3-5단어 안에서 만들고, 코러스 1마디 안에 첫 노출을 둡니다.",
          "- 훅 멜로디는 코드의 3도 또는 9도에서 시작해도 좋습니다. 3도는 안정, 9도는 더 현대적이고 서정적인 색입니다.",
          "- 참고곡의 멜로디 윤곽, 리듬 말맛, 애드립, 사운드 시그니처는 피하고 새 문장과 새 리듬으로 씁니다.",
          "",
          "[가사/상황]",
          `- 정서 재료: ${themes}`,
          "- 화자는 한 문장으로 말할 수 있는 상황을 잡고, 벌스는 장면, 프리코러스는 압력, 코러스는 결론으로 씁니다.",
          "- 코러스 첫 줄은 코드 해상 지점과 같은 의미의 문장으로 둡니다. 예: 인정, 고백, 포기, 돌아섬, 다시 시작.",
          "",
          "[편곡/보컬/믹스]",
          `- 편곡: ${arrangements}`,
          `- 보컬: ${vocals}`,
          `- 믹스: ${mixes}`,
          "- 1절은 적게, 첫 코러스는 선명하게, 마지막 코러스는 더블/애드립/응답으로 넓힙니다.",
          "",
          "[피할 것]",
          "- 원곡의 가사, 멜로디, 리프, 탑라인 윤곽, 애드립, 사운드 시그니처를 복제하지 않습니다.",
          "- 참고는 구조와 원리만 가져오고, 제목 문장과 리듬 포켓은 새로 만듭니다.",
          "",
          "[다음 작업]",
          "1. 제목 후보 5개를 한 줄 훅으로 씁니다.",
          "2. 8마디 코러스 멜로디를 먼저 만들고 벌스를 뒤에서 맞춥니다.",
          "3. 드럼/베이스/코드 루프만으로 60초 데모를 만듭니다.",
          "4. 참고곡과 나란히 듣고 비슷한 부분은 바로 바꿉니다.",
        ].join("\n");

        $("recipeBody").textContent = brief;
      }

      async function copyRecipe() {
        const text = $("recipeBody").textContent.trim();
        if (!text) return;
        try {
          await navigator.clipboard.writeText(text);
          setStatus("브리프 복사됨");
        } catch {
          setStatus("브리프를 선택해서 복사하세요", true);
        }
      }

      function applyPreset(id) {
        state.activePreset = state.activePreset === id ? "" : id;
        state.renderLimit = 80;
        if (!state.activePreset || !["90-110", "125-140"].includes(state.activePreset)) {
          $("bpmFilter").value = "";
        }
        if (state.activePreset === "90-110") $("bpmFilter").value = "mid";
        if (state.activePreset === "125-140") $("bpmFilter").value = "dance";
        renderChips();
        renderSongs();
      }

      function wireEvents() {
        ["searchInput", "countryFilter", "genreFilter", "bpmFilter", "hookFilter", "confidenceFilter"].forEach((id) => {
          const eventName = id === "searchInput" ? "input" : "change";
          $(id).addEventListener(eventName, () => {
            if (id !== "searchInput") state.activePreset = "";
            state.renderLimit = 80;
            renderChips();
            renderSongs();
          });
        });

        $("quickChips").addEventListener("click", (event) => {
          const button = event.target.closest("[data-preset]");
          if (!button) return;
          applyPreset(button.dataset.preset);
        });

        $("songGrid").addEventListener("click", (event) => {
          const button = event.target.closest("[data-add]");
          if (!button) return;
          const song = state.filtered.find((item) => identity(item) === button.dataset.add);
          if (song) addSong(song);
        });

        $("selectedList").addEventListener("click", (event) => {
          const button = event.target.closest("[data-remove]");
          if (!button) return;
          removeSong(button.dataset.remove);
        });

        $("clearSelectionButton").addEventListener("click", () => {
          state.selected = [];
          saveSelection();
          renderSelection();
          renderSongs();
          buildRecipe();
        });

        $("randomButton").addEventListener("click", chooseRandom);
        $("recipeButton").addEventListener("click", buildRecipe);
        $("copyRecipeButton").addEventListener("click", copyRecipe);
        $("loadMoreButton").addEventListener("click", () => {
          state.renderLimit += 80;
          renderSongs();
        });
      }

      async function refresh() {
        try {
          const ledger = await loadLedger();
          state.ledger = ledger;
          state.songs = sortSongs(ledger.songs || []);
          fillSelect("countryFilter", uniqueOptions(state.songs, "country"), "전체 국가");
          fillSelect("genreFilter", uniqueOptions(state.songs, "genre"), "전체 장르");
          fillSelect("hookFilter", uniqueOptions(state.songs, "hook_type"), "전체 후크");
          fillSelect("confidenceFilter", uniqueOptions(state.songs, "data_confidence"), "전체 신뢰도");
          restoreSelection();
          renderMetrics(ledger);
          renderChips();
          renderSongs();
          renderSelection();
          buildRecipe();
          setStatus(`정상 동기화 ${compactDate(ledger.updated_at)}`);
        } catch (error) {
          console.error(error);
          $("songGrid").innerHTML = `<div class="error-box">${escapeHtml(error.message)}</div>`;
          setStatus("데이터 불러오기 실패", true);
        }
      }

      fillStaticSelect("bpmFilter", bpmBuckets);
      wireEvents();
      refresh();
      setInterval(refresh, 5 * 60 * 1000);
    </script>
  </body>
</html>
